<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos | FrameFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    .progress-fill { transition: width 0.5s ease-out; }
  </style>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 font-sans antialiased" data-page="proyectos">

  <div class="flex h-full min-h-screen">
    <div id="sidebar-mount" class="contents"></div>

    <main class="flex flex-1 flex-col min-w-0 overflow-hidden">
      <header class="sticky top-0 z-20 border-b border-zinc-800/80 bg-zinc-950/90 backdrop-blur-xl">
        <div class="flex flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex items-center gap-3">
            <button id="menu-toggle" type="button" class="lg:hidden rounded-lg border border-zinc-700 bg-zinc-800/50 p-2 text-zinc-300" aria-label="Menú">
              <i data-lucide="menu" class="h-5 w-5"></i>
            </button>
            <div>
              <h1 class="text-lg font-semibold text-white sm:text-xl">Proyectos</h1>
              <p class="text-xs text-zinc-500">Planificación, producción y archivo</p>
            </div>
          </div>
          <div class="relative flex-1 max-w-xl">
            <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-zinc-500"></i>
            <input id="search-projects" type="search" placeholder="Buscar por nombre, cliente o tipo..." class="w-full rounded-xl border border-zinc-700/80 bg-zinc-900/80 py-2.5 pl-10 pr-4 text-sm text-zinc-100 placeholder:text-zinc-500 focus:border-cyan-500/50 focus:outline-none focus:ring-2 focus:ring-cyan-500/20" autocomplete="off" />
          </div>
        </div>
        <div class="px-4 sm:px-6 lg:px-8 pb-3 flex flex-wrap items-center gap-2">
          <div class="flex flex-wrap gap-1.5" id="project-filters" role="tablist">
            <button type="button" data-status="all" class="project-filter-btn rounded-md bg-zinc-800 px-2.5 py-1 text-[11px] font-medium text-zinc-200">Todos</button>
            <button type="button" data-status="planificacion" class="project-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium text-zinc-500 hover:bg-zinc-800/60">Planificación</button>
            <button type="button" data-status="produccion" class="project-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium text-zinc-500 hover:bg-zinc-800/60">En Producción</button>
            <button type="button" data-status="finalizado" class="project-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium text-zinc-500 hover:bg-zinc-800/60">Finalizado</button>
          </div>
          <p id="projects-count" class="ml-auto text-[11px] text-zinc-600"></p>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6 lg:px-8">
        <div id="projects-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        <p id="projects-empty" class="hidden py-16 text-center text-sm text-zinc-500">Ningún proyecto coincide con la búsqueda.</p>
      </div>
    </main>
  </div>

  <script src="db.js"></script>
  <script src="sidebar.js"></script>
  <script>
    const { COLOR_PALETTE, TYPE_LABELS, STATUS_META } = FrameFlowDB;

    let statusFilter = 'all';
    let searchQuery = '';

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function formatDateES(iso) {
      return new Date(iso + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function getColor(idx) {
      return FrameFlowDB.getColor(idx);
    }

    function projectMatches(p) {
      if (statusFilter !== 'all' && p.status !== statusFilter) return false;
      if (!searchQuery) return true;
      const hay = `${p.name} ${p.client} ${TYPE_LABELS[p.type]} ${STATUS_META[p.status].label}`.toLowerCase();
      return hay.includes(searchQuery.toLowerCase());
    }

    function renderProjects() {
      const proyectos = FrameFlowDB.getProjects();
      const visible = proyectos.filter(projectMatches);
      const grid = document.getElementById('projects-grid');
      const empty = document.getElementById('projects-empty');
      document.getElementById('projects-count').textContent =
        `${visible.length} de ${proyectos.length} proyectos`;

      if (!visible.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = visible.map((p) => {
        const color = getColor(p.colorIndex);
        const st = STATUS_META[p.status];
        const href = `proyecto-detalle.html?id=${encodeURIComponent(p.id)}`;
        const budgetLabel = typeof p.budget === 'number' ? FrameFlowDB.formatBudget(p.budget) : p.budget;
        return `
          <article data-href="${href}" class="project-card flex flex-col rounded-xl border ${color.border} bg-zinc-900/50 p-5 cursor-pointer hover:shadow-lg hover:shadow-cyan-500/5 transition-all" tabindex="0" role="link">
            <div class="flex items-start justify-between gap-2">
              <h2 class="text-sm font-semibold text-white leading-snug">${escapeHtml(p.name)}</h2>
              <span class="shrink-0 rounded-full ${st.badge} px-2 py-0.5 text-[10px] font-semibold">${st.label}</span>
            </div>
            <p class="mt-1 text-xs text-zinc-500">Cliente: <span class="text-zinc-400">${escapeHtml(p.client)}</span></p>
            <p class="mt-1 text-xs text-zinc-500">${TYPE_LABELS[p.type]} · <span class="text-cyan-400/90">${escapeHtml(budgetLabel)}</span></p>
            <div class="mt-4">
              <div class="flex justify-between text-[10px] text-zinc-500 mb-1.5">
                <span>Progreso</span>
                <span class="text-zinc-400 font-medium">${p.progress}%</span>
              </div>
              <div class="h-1.5 overflow-hidden rounded-full bg-zinc-800">
                <div class="progress-fill h-full rounded-full bg-gradient-to-r ${color.bar}" style="width:${p.progress}%"></div>
              </div>
            </div>
            <div class="mt-4 flex items-center gap-2 text-[10px] text-zinc-600">
              <i data-lucide="calendar" class="h-3 w-3"></i>
              <span>${formatDateES(p.start)} — ${formatDateES(p.end)}</span>
            </div>
          </article>
        `;
      }).join('');
      lucide.createIcons();
    }

    function bindCards() {
      const grid = document.getElementById('projects-grid');
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.project-card');
        if (card?.dataset.href) location.href = card.dataset.href;
      });
      grid.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const card = e.target.closest('.project-card');
        if (card?.dataset.href) { e.preventDefault(); location.href = card.dataset.href; }
      });
    }

    document.getElementById('search-projects').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderProjects();
    });

    document.querySelectorAll('.project-filter-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        statusFilter = btn.dataset.status;
        document.querySelectorAll('.project-filter-btn').forEach((b) => {
          const on = b.dataset.status === statusFilter;
          b.classList.toggle('bg-zinc-800', on);
          b.classList.toggle('text-zinc-200', on);
          b.classList.toggle('text-zinc-500', !on);
        });
        renderProjects();
      });
    });

    FrameFlowSidebar.mount('sidebar-mount', 'proyectos');
    bindCards();
    renderProjects();
    lucide.createIcons();
  </script>
</body>
</html>
