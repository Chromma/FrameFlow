<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesa de Trabajo | FrameFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    .progress-fill { transition: width 0.5s ease-out; }
  </style>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 font-sans antialiased" data-page="proyectos">
  <div class="flex h-full min-h-screen">
    <div id="sidebar-mount" class="contents"></div>
    <main class="flex flex-1 flex-col min-w-0 overflow-hidden">
      <header class="sticky top-0 z-20 border-b border-zinc-800/80 bg-zinc-950/90 backdrop-blur-xl">
        <div class="flex items-center gap-3 px-4 py-3 sm:px-6 lg:px-8">
          <button id="menu-toggle" type="button" class="lg:hidden rounded-lg border border-zinc-700 bg-zinc-800/50 p-2 text-zinc-300"><i data-lucide="menu" class="h-5 w-5"></i></button>
          <a href="proyectos.html" class="inline-flex items-center gap-1.5 text-sm text-zinc-500 hover:text-cyan-400"><i data-lucide="arrow-left" class="h-4 w-4"></i> Proyectos</a>
        </div>
      </header>
      <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6 lg:px-8">
        <div id="not-found" class="hidden py-20 text-center text-zinc-500">Proyecto no encontrado.</div>
        <div id="detail" class="hidden max-w-5xl mx-auto space-y-8">
          <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
              <p class="text-[10px] uppercase tracking-wider text-cyan-400 font-semibold">Mesa de trabajo completa</p>
              <h1 id="p-name" class="text-2xl font-semibold text-white mt-1"></h1>
              <p id="p-client" class="text-sm text-zinc-500 mt-1"></p>
            </div>
            <div class="flex flex-wrap gap-2 items-center">
              <select id="p-status" class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-xs text-zinc-200 focus:outline-none focus:ring-2 focus:ring-cyan-500/20"></select>
              <select id="p-color" class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-xs text-zinc-200 focus:outline-none"></select>
            </div>
          </div>
          <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-5">
            <div class="flex justify-between text-xs text-zinc-500 mb-2"><span>Progreso</span><span id="p-progress-label" class="text-zinc-300"></span></div>
            <input id="p-progress" type="range" min="0" max="100" class="w-full accent-cyan-500" />
            <div class="h-2 mt-2 overflow-hidden rounded-full bg-zinc-800"><div id="p-progress-bar" class="progress-fill h-full rounded-full bg-gradient-to-r from-cyan-500 to-cyan-400" style="width:0%"></div></div>
          </div>
          <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4"><p class="text-[10px] uppercase text-zinc-500">Tipo</p><p id="p-type" class="mt-1 text-sm font-medium"></p></div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4"><p class="text-[10px] uppercase text-zinc-500">Presupuesto</p><input id="p-budget" type="number" min="0" step="100" class="mt-1 w-full bg-transparent text-sm font-medium text-cyan-400 focus:outline-none" /></div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4"><p class="text-[10px] uppercase text-zinc-500">Inicio</p><input id="p-start" type="date" class="mt-1 w-full bg-transparent text-sm [color-scheme:dark] focus:outline-none" /></div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4"><p class="text-[10px] uppercase text-zinc-500">Fin</p><input id="p-end" type="date" class="mt-1 w-full bg-transparent text-sm [color-scheme:dark] focus:outline-none" /></div>
          </div>
          <section class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-6">
            <label for="p-desc" class="text-base font-semibold text-white flex items-center gap-2 mb-3"><i data-lucide="file-text" class="h-5 w-5 text-cyan-400"></i> Descripción</label>
            <textarea id="p-desc" rows="4" class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2 text-sm text-zinc-300 resize-none focus:outline-none focus:ring-2 focus:ring-cyan-500/20"></textarea>
          </section>
          <section class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-6">
            <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-4"><i data-lucide="check-square" class="h-5 w-5 text-cyan-400"></i> Tareas</h2>
            <form id="task-form" class="flex gap-2 mb-4"><input id="task-input" type="text" placeholder="Nueva tarea..." class="flex-1 rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" /><button type="submit" class="rounded-lg bg-cyan-500/20 px-4 py-2 text-xs font-semibold text-cyan-400 hover:bg-cyan-500/30">Añadir</button></form>
            <ul id="task-list" class="space-y-2"></ul>
          </section>
          <section class="grid gap-6 lg:grid-cols-2">
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-6">
              <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-4"><i data-lucide="map-pin" class="h-5 w-5 text-cyan-400"></i> Locaciones vinculadas</h2>
              <div id="linked-locs" class="grid gap-3 sm:grid-cols-2"></div>
              <p id="linked-locs-empty" class="hidden text-sm text-zinc-500">Sin locaciones. Asigna desde el <a href="catalogo.html?vista=locaciones" class="text-cyan-400">catálogo</a>.</p>
            </div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-6">
              <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-4"><i data-lucide="users" class="h-5 w-5 text-cyan-400"></i> Casting vinculado</h2>
              <div id="linked-cast" class="grid gap-3 sm:grid-cols-2"></div>
              <p id="linked-cast-empty" class="hidden text-sm text-zinc-500">Sin perfiles. Asigna desde el <a href="catalogo.html?vista=casting" class="text-cyan-400">catálogo</a>.</p>
            </div>
          </section>
          <button type="button" id="btn-save" class="w-full sm:w-auto rounded-xl bg-gradient-to-r from-cyan-500 to-cyan-600 px-8 py-3 text-sm font-semibold text-zinc-950 shadow-lg shadow-cyan-500/25 hover:from-cyan-400 hover:to-cyan-500">Guardar cambios</button>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-6 left-1/2 z-50 hidden -translate-x-1/2 rounded-xl border border-emerald-500/30 bg-zinc-900 px-4 py-3 text-sm text-emerald-400 shadow-2xl">Guardado</div>
  <script src="db.js"></script>
  <script src="sidebar.js"></script>
  <script>
    const { TYPE_LABELS, STATUS_META, formatBudget, getColor, TIPO_ACTOR_LABELS } = FrameFlowDB;
    const COLOR_NAMES = ['Cian', 'Violeta', 'Esmeralda', 'Ámbar', 'Rosa', 'Fucsia'];
    let projectId = new URLSearchParams(location.search).get('id');

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2200); }

    function renderTasks(tareas) {
      const ul = document.getElementById('task-list');
      if (!tareas.length) { ul.innerHTML = '<li class="text-sm text-zinc-500">Sin tareas.</li>'; return; }
      ul.innerHTML = tareas.map((t) => `
        <li class="flex items-center gap-3 rounded-lg border border-zinc-800 bg-zinc-900/50 px-3 py-2">
          <input type="checkbox" data-task-id="${t.id}" ${t.done ? 'checked' : ''} class="rounded border-zinc-600 bg-zinc-800 text-cyan-500" />
          <span class="flex-1 text-sm ${t.done ? 'text-zinc-500 line-through' : 'text-zinc-200'}">${escapeHtml(t.text)}</span>
          <button type="button" data-del-task="${t.id}" class="text-zinc-600 hover:text-red-400 p-1"><i data-lucide="trash-2" class="h-3.5 w-3.5"></i></button>
        </li>`).join('');
      lucide.createIcons();
    }

    function renderLinkedResources(p) {
      const locs = (p.locaciones || []).map(FrameFlowDB.getLocacion).filter(Boolean);
      const cast = (p.actores || []).map(FrameFlowDB.getActor).filter(Boolean);
      const locEl = document.getElementById('linked-locs');
      const castEl = document.getElementById('linked-cast');
      document.getElementById('linked-locs-empty').classList.toggle('hidden', locs.length > 0);
      document.getElementById('linked-cast-empty').classList.toggle('hidden', cast.length > 0);
      locEl.innerHTML = locs.map((l) => `
        <a href="detalle-locacion.html?id=${l.id}" class="flex gap-3 rounded-lg border border-zinc-800 bg-zinc-900/50 p-2 hover:border-zinc-700">
          <img src="${l.imagen}" alt="" class="h-14 w-14 rounded-lg object-cover" />
          <div class="min-w-0"><p class="text-xs font-semibold text-white truncate">${escapeHtml(l.nombre)}</p><p class="text-[10px] text-cyan-400">${formatBudget(l.precioJornada)}/jornada</p></div>
        </a>`).join('');
      castEl.innerHTML = cast.map((a) => `
        <a href="detalle-casting.html?id=${a.id}" class="flex gap-3 rounded-lg border border-zinc-800 bg-zinc-900/50 p-2 hover:border-zinc-700">
          <img src="${a.imagen}" alt="" class="h-14 w-14 rounded-lg object-cover object-top" />
          <div class="min-w-0"><p class="text-xs font-semibold text-white truncate">${escapeHtml(a.nombre)}</p><p class="text-[10px] text-zinc-500">${TIPO_ACTOR_LABELS[a.tipo] || a.tipo}</p></div>
        </a>`).join('');
    }

    function loadProject() {
      const p = FrameFlowDB.getProject(projectId);
      if (!p) { document.getElementById('not-found').classList.remove('hidden'); return; }
      document.getElementById('detail').classList.remove('hidden');
      document.title = `${p.name} | FrameFlow`;
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-client').textContent = `Cliente: ${p.client}`;
      document.getElementById('p-type').textContent = TYPE_LABELS[p.type];
      document.getElementById('p-budget').value = p.budget;
      document.getElementById('p-start').value = p.start;
      document.getElementById('p-end').value = p.end;
      document.getElementById('p-desc').value = p.description || '';
      document.getElementById('p-progress').value = p.progress;
      document.getElementById('p-progress-label').textContent = `${p.progress}%`;
      const bar = document.getElementById('p-progress-bar');
      bar.style.width = `${p.progress}%`;
      bar.className = `progress-fill h-full rounded-full bg-gradient-to-r ${getColor(p.colorIndex).bar}`;
      document.getElementById('p-status').innerHTML = Object.entries(STATUS_META).map(([k, v]) => `<option value="${k}" ${p.status === k ? 'selected' : ''}>${v.label}</option>`).join('');
      document.getElementById('p-color').innerHTML = COLOR_NAMES.map((n, i) => `<option value="${i}" ${p.colorIndex === i ? 'selected' : ''}>${n}</option>`).join('');
      renderTasks(p.tareas || []);
      renderLinkedResources(p);
    }

    function collectAndSave() {
      const p = FrameFlowDB.getProject(projectId);
      if (!p) return;
      const tareas = [...(p.tareas || [])];
      document.querySelectorAll('#task-list input[type=checkbox]').forEach((cb) => {
        const t = tareas.find((x) => x.id === cb.dataset.taskId);
        if (t) t.done = cb.checked;
      });
      FrameFlowDB.updateProject(projectId, {
        status: document.getElementById('p-status').value,
        colorIndex: Number(document.getElementById('p-color').value),
        budget: Number(document.getElementById('p-budget').value) || 0,
        start: document.getElementById('p-start').value,
        end: document.getElementById('p-end').value,
        description: document.getElementById('p-desc').value.trim(),
        progress: Number(document.getElementById('p-progress').value),
        tareas,
      });
      loadProject();
      toast('Cambios guardados');
    }

    document.getElementById('p-progress').addEventListener('input', (e) => {
      document.getElementById('p-progress-label').textContent = `${e.target.value}%`;
      document.getElementById('p-progress-bar').style.width = `${e.target.value}%`;
    });

    document.getElementById('task-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('task-input').value.trim();
      if (!text) return;
      const p = FrameFlowDB.getProject(projectId);
      const tareas = [...(p.tareas || []), { id: 't' + Date.now(), text, done: false }];
      FrameFlowDB.updateProject(projectId, { tareas });
      document.getElementById('task-input').value = '';
      renderTasks(tareas);
    });

    document.getElementById('task-list').addEventListener('click', (e) => {
      const del = e.target.closest('[data-del-task]');
      if (!del) return;
      const p = FrameFlowDB.getProject(projectId);
      const tareas = (p.tareas || []).filter((t) => t.id !== del.dataset.delTask);
      FrameFlowDB.updateProject(projectId, { tareas });
      renderTasks(tareas);
    });

    document.getElementById('btn-save').addEventListener('click', collectAndSave);
    FrameFlowSidebar.mount('sidebar-mount', 'proyectos');
    loadProject();
    lucide.createIcons();
  </script>
</body>
</html>
