    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    .booking-sticky { position: sticky; top: 88px; }
    .photo-mosaic {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      height: min(56vh, 480px);
      min-height: 280px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .photo-mosaic .mosaic-main {
      grid-column: 1 / 3;
      grid-row: 1 / 3;
    }
    .photo-mosaic button {
      position: relative;
      overflow: hidden;
      border: none;
      padding: 0;
      cursor: pointer;
      background: #27272a;
    }
    .photo-mosaic button img,
    .photo-mosaic .mosaic-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease, filter 0.35s ease;
    }
    .photo-mosaic button:hover img {
      transform: scale(1.03);
      filter: brightness(1.08);
    }
    @media (max-width: 640px) {
      .photo-mosaic {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 200px 100px 100px;
        height: auto;
      }
      .photo-mosaic .mosaic-main { grid-column: 1 / 3; grid-row: 1; }
    }
    .ff-cal-compact .ff-cal-day {
      width: 2rem;
      height: 2rem;
      aspect-ratio: auto;
      font-size: 0.75rem;
      border-radius: 8px;
    }
    @media (max-width: 640px) {
      .ff-cal-compact #cal-days,
      .ff-cal-compact #cal-weekdays { gap: 0.125rem; }
      .ff-cal-compact #cal-weekdays span { font-size: 9px; }
    }
    .ff-cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 6px; }
    .ff-cal-day.free { background: rgba(16, 185, 129, 0.08); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.15); }
    .ff-cal-day.busy { background: rgba(239, 68, 68, 0.12); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }
    .ff-cal-day.selected { background: rgba(34, 211, 238, 0.15); color: #fff; border: 1px solid rgba(34, 211, 238, 0.4); }
    .ff-cal-day.other-month { opacity: 0.2; }
    .lightbox-trigger { cursor: zoom-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .toast-show { animation: fadeIn 0.2s ease-out; }
  </style>
</head>

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;

    function renderAssignMenus(containerId, actorId) {
      const el = document.getElementById(containerId);
      const projects = FrameFlowDB.getProjects().filter((p) => !['finalizado', 'archivado'].includes(p.status));
      el.innerHTML = `
        <button type="button" class="assign-opt w-full px-4 py-2.5 text-left text-sm text-cyan-400 hover:bg-zinc-800 flex items-center gap-2" data-project-id="new">

          <button type="button" class="assign-opt w-full px-4 py-2.5 text-left hover:bg-zinc-800" data-project-id="${p.id}">
            <span class="text-sm text-zinc-200">${escapeHtml(p.name)}</span>
            <span class="block text-[10px] text-zinc-500">${escapeHtml(STATUS_META[p.status]?.label || '')}</span>
          </button>
        `).join('')}
      `;

        });
      });
      lucide.createIcons();
    }

    function fillProjectSelect() {

    }

    function renderCastingMosaic(a) {
      const mosaic = document.getElementById('photo-mosaic');
      const composites = a.composite.slice(0, 4);
      while (composites.length < 4) {
        composites.push(composites[composites.length - 1] || { src: a.imagen, label: 'Composite' });
      }

      const mainCell = `
        <div class="mosaic-main relative overflow-hidden bg-zinc-900">
          <img id="reel-poster" src="${escapeHtml(a.imagen)}" alt="Videoreel de ${escapeHtml(a.nombre)}" class="h-full w-full object-cover object-top opacity-75" />
          <div class="absolute inset-0 bg-gradient-to-t from-zinc-950/90 via-zinc-950/25 to-transparent pointer-events-none"></div>
          <button type="button" id="btn-play-reel" class="absolute left-1/2 top-1/2 z-10 flex h-14 w-14 sm:h-16 sm:w-16 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full bg-cyan-500/90 text-zinc-950 shadow-xl shadow-cyan-500/30 hover:scale-105 transition-transform" aria-label="Reproducir videoreel">
            <i data-lucide="play" class="h-7 w-7 sm:h-8 sm:w-8 ml-1"></i>
          </button>
          <p class="absolute bottom-3 left-3 text-[11px] font-medium text-zinc-300">Showreel 2025 · HD</p>
        </div>
      `;

      const cells = composites.map((c, i) => `
        <button type="button" class="lightbox-trigger" aria-label="${escapeHtml(c.label)}" data-lightbox-index="${i}">
          <img src="${escapeHtml(c.src)}" alt="${escapeHtml(c.label)}" loading="lazy" />
        </button>
      `).join('');

      mosaic.innerHTML = mainCell + cells;

      mosaic.querySelectorAll('.lightbox-trigger').forEach((btn) => {
        btn.addEventListener('click', () => {
          FrameFlowUI.openLightbox(a.composite.map((c) => ({ src: c.src, label: c.label })), Number(btn.dataset.lightboxIndex), a.nombre);
        });
      });

      document.getElementById('btn-play-reel')?.addEventListener('click', (e) => {
        e.stopPropagation();
        showToast('Reproducción de videoreel (demo)');
      });
    }

    function renderActor(a) {
      currentActor = a;
      document.title = `${a.nombre} | Casting | FrameFlow`;
      document.getElementById('actor-name').textContent = a.nombre;
      document.getElementById('actor-age').innerHTML = `<i data-lucide="cake" class="h-4 w-4 text-cyan-400"></i> ${a.edad} años`;
      document.getElementById('actor-height').innerHTML = `<i data-lucide="ruler" class="h-4 w-4 text-zinc-500"></i> ${a.estatura.toFixed(2)} m`;
      document.getElementById('actor-city').innerHTML = `<i data-lucide="map-pin" class="h-4 w-4 text-zinc-500"></i> ${escapeHtml(a.ubicacion.ciudad)}, ${escapeHtml(a.ubicacion.pais)}`;
      document.getElementById('actor-disciplines').innerHTML = a.disciplinas.map((d) =>
        `<span class="rounded-full border border-cyan-500/30 bg-cyan-500/10 px-3 py-1 text-xs font-semibold text-cyan-400">${escapeHtml(d)}</span>`
      ).join('');
      renderCastingMosaic(a);
      document.getElementById('actor-skills').innerHTML = a.habilidades.map((h) => `
        <div class="flex items-center gap-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40 px-4 py-3">
          <i data-lucide="${h.icon}" class="h-5 w-5 text-cyan-400 shrink-0"></i>
          <span class="text-sm text-zinc-200">${escapeHtml(h.text)}</span>
        </div>
      `).join('');
      document.getElementById('actor-reviews').innerHTML = a.resenas.map((r) => `
        <div class="px-5 py-4">
          <p class="text-sm font-semibold text-zinc-200">${escapeHtml(r.autor)}</p>
          <p class="mt-2 text-sm text-zinc-400 leading-relaxed">${escapeHtml(r.texto)}</p>
        </div>
      `).join('');
      calendarApi = FrameFlowUI.mountCompactCalendar({
        monthLabelId: 'cal-month-label',
        weekdaysId: 'cal-weekdays',
        daysId: 'cal-days',
        prevBtnId: 'cal-prev',
        nextBtnId: 'cal-next',
        busyDays: a.diasOcupados || [],
        startInput: document.getElementById('rodaje-desde'),
        endInput: document.getElementById('rodaje-hasta'),
        initialDate: '2026-06-01',
      });
      lucide.createIcons();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      clearTimeout(showToast._x);
      showToast._x = setTimeout(() => t.classList.add('hidden'), 2800);
    }

    const actor = getActor();
    const catalogView = sessionStorage.getItem('ff_catalog_view') || 'casting';
    document.getElementById('back-catalog').href = FrameFlowDB.catalogBackUrl(catalogView);
    FrameFlowSidebar.mount('sidebar-mount', 'catalogo');
    renderActor(actor);
    fillProjectSelect();
    renderAssignMenus('header-assign-menu', actor.id);

    document.getElementById('btn-assign-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('header-assign-menu').classList.toggle('hidden');
    });
    document.addEventListener('click', () => document.getElementById('header-assign-menu').classList.add('hidden'));

    document.getElementById('btn-share').addEventListener('click', async () => {
      const url = window.location.href;
      try {
        if (navigator.share) await navigator.share({ title: actor.nombre, url });
        else { await navigator.clipboard.writeText(url); showToast('Enlace copiado'); }
      } catch { showToast('No se pudo compartir'); }
    });

    document.getElementById('casting-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const proj = document.getElementById('proyecto-destino').value;
      if (!proj) { showToast('Selecciona un proyecto activo'); return; }
      const result = FrameFlowDB.assignResourceWithBudget(proj, 'actor', actor.id);
      showToast(result.overBudget ? 'Vinculado — presupuesto excedido' : 'Añadido con éxito al proyecto');
    });

    document.getElementById('btn-cotizar').addEventListener('click', () => {
      const dbActor = FrameFlowDB.getActor(actor.id);
      FrameFlowUI.openChat({
        resourceId: actor.id,
        resourceType: 'actor',
        name: actor.nombre,
        avatar: actor.imagen,
        roleBadge: dbActor ? (FrameFlowDB.TIPO_ACTOR_LABELS[dbActor.tipo] || dbActor.tipo) : (actor.disciplines?.[0] || 'Casting'),
        price: dbActor?.precioJornada,
      });
    });

    lucide.createIcons();
  </script>
</body>
</html>
