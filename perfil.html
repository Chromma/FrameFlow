<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | FrameFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  </style>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 font-sans antialiased" data-page="perfil">
  <div class="flex h-full min-h-screen">
    <div id="sidebar-mount" class="contents"></div>
    <main class="flex flex-1 flex-col min-w-0 overflow-hidden">
      <header class="sticky top-0 z-20 border-b border-zinc-800/80 bg-zinc-950/90 backdrop-blur-xl">
        <div class="flex items-center gap-3 px-4 py-4 sm:px-6 lg:px-8">
          <button id="menu-toggle" type="button" class="lg:hidden rounded-lg border border-zinc-700 bg-zinc-800/50 p-2 text-zinc-300"><i data-lucide="menu" class="h-5 w-5"></i></button>
          <h1 class="text-lg font-semibold text-white sm:text-xl flex items-center gap-2"><i data-lucide="user-circle" class="h-6 w-6 text-cyan-400"></i> Mi Perfil</h1>
        </div>
      </header>
      <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6 lg:px-8">
        <div class="max-w-xl mx-auto space-y-6">
          <div class="flex items-center gap-4 rounded-xl border border-zinc-800 bg-zinc-900/50 p-5">
            <div id="avatar-preview" class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-zinc-700 text-xl font-bold overflow-hidden">AR</div>
            <div>
              <p class="text-sm text-zinc-500">Foto de perfil (URL)</p>
              <input id="profile-avatar" type="url" placeholder="https://..." class="mt-1 w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
          </div>
          <form id="profile-form" class="space-y-4 rounded-xl border border-zinc-800 bg-zinc-900/40 p-6">
            <div>
              <label for="profile-name" class="block text-xs font-medium text-zinc-400 mb-1.5">Nombre completo</label>
              <input id="profile-name" required class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <div>
              <label for="profile-role" class="block text-xs font-medium text-zinc-400 mb-1.5">Cargo</label>
              <input id="profile-role" class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <div>
              <label for="profile-email" class="block text-xs font-medium text-zinc-400 mb-1.5">Correo electrónico</label>
              <input id="profile-email" type="email" required class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <div>
              <label for="profile-phone" class="block text-xs font-medium text-zinc-400 mb-1.5">Teléfono de contacto</label>
              <input id="profile-phone" type="tel" class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <div>
              <label for="profile-portfolio" class="block text-xs font-medium text-zinc-400 mb-1.5">Link a portafolio</label>
              <input id="profile-portfolio" type="url" class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <hr class="border-zinc-800" />
            <div>
              <label for="profile-password" class="block text-xs font-medium text-zinc-400 mb-1.5">Nueva contraseña</label>
              <input id="profile-password" type="password" placeholder="Dejar en blanco para no cambiar" class="w-full rounded-lg border border-zinc-700 bg-zinc-800/80 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/20" />
            </div>
            <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-cyan-500 to-cyan-600 py-3 text-sm font-semibold text-zinc-950 shadow-lg shadow-cyan-500/25 hover:from-cyan-400 hover:to-cyan-500">Guardar perfil</button>
          </form>
          <p class="text-center text-xs text-zinc-600">La configuración técnica de la productora está en <a href="configuracion.html" class="text-cyan-400 hover:underline">Configuración</a>.</p>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-6 left-1/2 z-50 hidden -translate-x-1/2 rounded-xl border border-emerald-500/30 bg-zinc-900 px-4 py-3 text-sm text-emerald-400">Perfil actualizado</div>
  <script src="db.js"></script>
  <script src="sidebar.js"></script>
  <script>
    function loadProfile() {
      const u = FrameFlowDB.getUser();
      document.getElementById('profile-name').value = u.name || '';
      document.getElementById('profile-role').value = u.role || '';
      document.getElementById('profile-email').value = u.email || '';
      document.getElementById('profile-phone').value = u.phone || '';
      document.getElementById('profile-portfolio').value = u.portfolio || '';
      document.getElementById('profile-avatar').value = u.avatarUrl || '';
      updateAvatarPreview(u);
    }
    function updateAvatarPreview(u) {
      const el = document.getElementById('avatar-preview');
      if (u.avatarUrl) el.innerHTML = `<img src="${u.avatarUrl}" alt="" class="h-full w-full object-cover" />`;
      else el.textContent = u.avatarInitials || (u.name || 'U').slice(0, 2).toUpperCase();
    }
    document.getElementById('profile-avatar').addEventListener('input', (e) => {
      updateAvatarPreview({ ...FrameFlowDB.getUser(), avatarUrl: e.target.value });
    });
    document.getElementById('profile-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('profile-name').value.trim();
      FrameFlowDB.saveUser({
        name,
        role: document.getElementById('profile-role').value.trim(),
        email: document.getElementById('profile-email').value.trim(),
        phone: document.getElementById('profile-phone').value.trim(),
        portfolio: document.getElementById('profile-portfolio').value.trim(),
        avatarUrl: document.getElementById('profile-avatar').value.trim(),
        avatarInitials: name.split(' ').map((w) => w[0]).join('').slice(0, 2).toUpperCase(),
      });
      document.getElementById('toast').classList.remove('hidden');
      setTimeout(() => document.getElementById('toast').classList.add('hidden'), 2500);
      FrameFlowSidebar.mount('sidebar-mount', 'perfil');
    });
    FrameFlowSidebar.mount('sidebar-mount', 'perfil');
    loadProfile();
    lucide.createIcons();
  </script>
</body>
</html>
